steps:
  # Step 1: Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/blue-lagoon-backend:$COMMIT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/blue-lagoon-backend:latest",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  # Step 2: Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/blue-lagoon-backend:$COMMIT_SHA"]

  # Step 3: Deploy to Cloud Run automatically
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "blue-lagoon-service-be",
        "--image",
        "gcr.io/$PROJECT_ID/blue-lagoon-backend:$COMMIT_SHA",
        "--region",
        "africa-south1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
      ]

images:
  - "gcr.io/$PROJECT_ID/blue-lagoon-backend:$COMMIT_SHA"
