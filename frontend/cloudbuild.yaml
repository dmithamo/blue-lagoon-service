steps:
  # Step 1: Build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/blue-lagoon-frontend:$COMMIT_SHA',
        '-t',
        'gcr.io/$PROJECT_ID/blue-lagoon-frontend:latest',
        '-f',
        'frontend/Dockerfile',
        '.',
      ]

  # Step 2: Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/blue-lagoon-frontend:$COMMIT_SHA']

  # Step 3: Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'blue-lagoon-service-fe',
        '--image',
        'gcr.io/$PROJECT_ID/blue-lagoon-frontend:$COMMIT_SHA',
        '--region',
        'europe-west1',
        '--platform',
        'managed',
        '--allow-unauthenticated',
      ]

images:
  - 'gcr.io/$PROJECT_ID/blue-lagoon-frontend:$COMMIT_SHA'
