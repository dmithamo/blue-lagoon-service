<div class="flex flex-col items-center justify-center min-h-screen px-6">
  <div class="max-w-2xl w-full">
    <h1 class="text-4xl font-bold text-accent mb-8">Make a Reservation</h1>
    <p class="text-text-secondary mb-6">Book your room at Blue Lagoon Hotels & Resorts</p>
    <form class="space-y-4 bg-surface/50 p-6 rounded-lg border border-white/10 backdrop-blur-sm">
      <div>
        <label class="block text-sm font-medium text-text-primary mb-2">Guest Name</label>
        <input type="text" placeholder="Your full name" class="w-full px-4 py-2 bg-background border border-white/10 rounded text-text-primary placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-accent">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-text-primary mb-2">Check-in Date</label>
          <input type="date" class="w-full px-4 py-2 bg-background border border-white/10 rounded text-text-primary focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-primary mb-2">Check-out Date</label>
          <input type="date" class="w-full px-4 py-2 bg-background border border-white/10 rounded text-text-primary focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-text-primary mb-2">Number of Rooms</label>
        <input type="number" min="1" placeholder="1" class="w-full px-4 py-2 bg-background border border-white/10 rounded text-text-primary placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-accent">
      </div>
      <button type="submit" class="w-full px-6 py-3 bg-accent text-white rounded-lg hover:bg-accent-secondary transition-all duration-300 font-semibold mt-6">
        Reserve Now
      </button>
    </form>
  </div>
</div>
