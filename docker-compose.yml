version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blue-lagoon-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=blue-lagoon-service
      - SPRING_PROFILES_ACTIVE=docker
      - LOGGING_LEVEL_ROOT=INFO
    networks:
      - blue-lagoon-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: blue-lagoon-ui
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - blue-lagoon-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

networks:
  blue-lagoon-network:
    driver: bridge
