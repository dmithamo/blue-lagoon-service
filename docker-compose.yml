services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      # Force colored logs for easier local debugging
      - SPRING_OUTPUT_ANSI_ENABLED=ALWAYS

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    # This keeps the container interactive for debugging
    stdin_open: true
    tty: true
